global:
  scrape_interval: 5s

scrape_configs:
  - job_name: Mikrotik
    static_configs:
      - targets:
          - 10.0.0.254 # mikrotik_ip
    metrics_path: /snmp
    params:
      module: [mikrotik]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 192.168.10.53:9116  # The SNMP exporter's
# Wysyłanie danych do Mimira
remote_write:
  - url: http://mimir:9009/api/v1/push