auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# --- SEKCJA LIMITÓW I RETENCJI ---
limits_config:
  reject_old_samples: true
  # Ustawione na 720h (30 dni), aby uniknąć błędów przy starych logach Dockera
  reject_old_samples_max_age: 720h
  allow_structured_metadata: true
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  # Okres przechowywania logów na dysku
  retention_period: 30d

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  filesystem:
    directory: /loki/chunks

# --- SEKCJA KOMPAKTORA (USUWANIE DANYCH) ---
compactor:
  working_directory: /loki/retention
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  # Wymagane w nowszych wersjach przy włączonej retencji
  delete_request_store: filesystem